services:
  vllm-gpu0:
    image: ${VLLM_IMAGE}
    container_name: vllm-llama31-gpu0
    network_mode: host
    ipc: host
    group_add:
      - video
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    devices:
      - /dev/kfd
      - /dev/dri
    volumes:
      - ${HOST_HF_CACHE}:${HF_HOME}
    environment:
      HF_HOME: ${HF_HOME}
      HIP_VISIBLE_DEVICES: "0"
    command: >
      ${MODEL_NAME}
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --dtype ${DTYPE}
      --max-model-len ${MAX_MODEL_LEN}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION}

